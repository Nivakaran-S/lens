services:
  - type: web
    name: lens-api
    runtime: node
    plan: free  # bump to "starter" ($7/mo) to eliminate cold starts
    region: frankfurt  # closest to UK; pick "ohio" or "oregon" for US
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22
      # Secrets — set these in the Render dashboard, not here.
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_JWT_AUD
        value: authenticated
      - key: MONGODB_URL
        sync: false
      - key: MONGODB_DB_NAME
        value: lens
      - key: R2_ACCOUNT_ID
        sync: false
      - key: R2_ACCESS_KEY_ID
        sync: false
      - key: R2_SECRET_ACCESS_KEY
        sync: false
      - key: R2_BUCKET
        value: lens-packs
      - key: GEMINI_API_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      # Stripe — set in Render dashboard
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_CURRENCY
        value: gbp
      # Roles + credits policy
      - key: ADMIN_EMAILS
        sync: false  # comma-separated list of admin email addresses
      - key: INITIAL_FREE_CREDITS
        value: '10'
      - key: COST_PER_ANALYSIS
        value: '1'
      # Frontend URL — used for Stripe success/cancel redirects
      - key: FRONTEND_URL
        sync: false  # set to your Vercel URL, e.g. https://lens-auck.vercel.app
